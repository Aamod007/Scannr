apiVersion: apps/v1
kind: Deployment
metadata:
  name: dashboard-svc
  namespace: scannr
  labels:
    app: dashboard-svc
spec:
  replicas: 2
  selector:
    matchLabels:
      app: dashboard-svc
  template:
    metadata:
      labels:
        app: dashboard-svc
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      containers:
      - name: dashboard-svc
        image: scannr/dashboard-svc:latest
        ports:
        - containerPort: 8000
          name: http
        env:
        - name: PORT
          value: "8000"
        - name: VISION_SVC_URL
          value: "http://vision-svc:8000"
        - name: RISK_SVC_URL
          value: "http://risk-svc:8000"
        - name: IDENTITY_SVC_URL
          value: "http://identity-svc:8000"
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "250m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: dashboard-svc
  namespace: scannr
  labels:
    app: dashboard-svc
spec:
  selector:
    app: dashboard-svc
  ports:
  - port: 8000
    targetPort: 8000
    name: http
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: identity-svc
  namespace: scannr
  labels:
    app: identity-svc
spec:
  replicas: 2
  selector:
    matchLabels:
      app: identity-svc
  template:
    metadata:
      labels:
        app: identity-svc
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      containers:
      - name: identity-svc
        image: scannr/identity-svc:latest
        ports:
        - containerPort: 8000
          name: http
        env:
        - name: PORT
          value: "8000"
        - name: REDIS_URL
          value: "redis://redis:6379"
        - name: USE_FABRIC
          value: "false"
        envFrom:
        - secretRef:
            name: scannr-secrets
            optional: true
        resources:
          requests:
            memory: "256Mi"
            cpu: "200m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 15
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: identity-svc
  namespace: scannr
  labels:
    app: identity-svc
spec:
  selector:
    app: identity-svc
  ports:
  - port: 8000
    targetPort: 8000
    name: http
  type: ClusterIP
---
